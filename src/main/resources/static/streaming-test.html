<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流式响应测试 - AI Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            display: flex;
            gap: 10px;
            margin: 12px 0;
            animation: slideIn 0.3s ease-in-out;
        }

        .message-user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            font-size: 28px;
            flex-shrink: 0;
            width: 36px;
            text-align: center;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .message-user .message-content {
            background: #2196f3;
            color: white;
            border-bottom-right-radius: 0;
        }

        .message-assistant .message-content {
            background: white;
            border: 1px solid #ddd;
            border-bottom-left-radius: 0;
        }

        .stream-step {
            font-size: 12px;
            padding: 8px;
            margin: 5px 0 5px 40px;
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 4px;
            color: #2e7d32;
        }

        .search-result {
            font-size: 11px;
            padding: 6px 10px;
            margin: 3px 0 3px 40px;
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            border-radius: 4px;
        }

        .completion-stats {
            font-size: 11px;
            padding: 10px;
            margin: 10px 0 10px 40px;
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            border-radius: 4px;
            color: #1565c0;
        }

        .error-message {
            font-size: 12px;
            padding: 10px;
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
            margin: 10px 0;
            border-radius: 4px;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        #messageInput:focus {
            outline: none;
            border-color: #2196f3;
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
        }

        .btn {
            padding: 12px 24px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #1976d2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-secondary {
            background: #f44336;
            font-size: 12px;
            padding: 8px 16px;
        }

        .btn-secondary:hover {
            background: #d32f2f;
        }

        .status {
            font-size: 12px;
            color: #666;
            padding: 10px 20px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #2196f3;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .info-box {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 6px;
            padding: 12px;
            margin: 10px 20px;
            font-size: 12px;
            color: #1565c0;
        }

        @media (max-width: 600px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 流式响应测试</h1>
            <p>Server-Sent Events (SSE) 实时聊天演示</p>
        </div>

        <div class="content">
            <div class="messages" id="messages"></div>
        </div>

        <div class="info-box" id="infoBox">
            💡 提示: 输入问题，AI 将实时流式返回答案
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
            <div class="btn-group">
                <button class="btn" id="sendBtn" onclick="sendMessage()">发送</button>
                <button class="btn btn-secondary" id="clearBtn" onclick="clearChat()">清除</button>
            </div>
        </div>

        <div class="status" id="status">
            准备就绪
        </div>
    </div>

    <script src="/streaming-chat.js"></script>
    <script>
        let chat = new StreamingChat('messages');
        let isStreaming = false;

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();

            if (!message) {
                alert('请输入消息');
                return;
            }

            if (isStreaming) {
                alert('请等待当前响应完成');
                return;
            }

            isStreaming = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('status').innerHTML = '<span class="spinner"></span> 正在思考...';

            try {
                chat.startStreamingChat(message, chat.getSessionId());
                messageInput.value = '';
                
                // 等待流完成（这里使用简单的延时）
                await new Promise(resolve => setTimeout(resolve, 500));
                
                document.getElementById('status').innerHTML = '✅ 响应完成';
            } catch (error) {
                console.error('错误:', error);
                document.getElementById('status').innerHTML = '❌ 出错: ' + error.message;
            } finally {
                isStreaming = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function clearChat() {
            chat.clearMessages();
            document.getElementById('messages').innerHTML = '';
            document.getElementById('status').innerHTML = '聊天已清除';
            document.getElementById('infoBox').style.display = 'block';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 页面加载完成后的初始化
        window.addEventListener('load', () => {
            document.getElementById('messageInput').focus();
            console.log('✅ 流式响应测试页面已加载');
            console.log('Session ID:', chat.getSessionId());
        });

        // 自动隐藏信息框
        document.getElementById('messages').addEventListener('scroll', function() {
            if (this.scrollTop > 100) {
                document.getElementById('infoBox').style.display = 'none';
            }
        });
    </script>
</body>
</html>
