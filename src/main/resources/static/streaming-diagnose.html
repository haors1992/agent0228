<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流式响应诊断工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #4ec9b0;
            margin-bottom: 20px;
        }
        
        .section {
            margin-bottom: 30px;
            border: 1px solid #333;
            padding: 15px;
            background: #252526;
            border-radius: 5px;
        }
        
        .section h2 {
            color: #9cdcfe;
            margin-bottom: 10px;
        }
        
        input, button {
            padding: 8px 12px;
            margin: 5px 5px 5px 0;
            background: #3e3e42;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 3px;
            font-family: monospace;
            cursor: pointer;
        }
        
        button:hover {
            background: #4e4e54;
        }
        
        #console {
            background: #1e1e1e;
            border: 1px solid #555;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .log-debug { color: #9cdcfe; }
        .log-info { color: #4ec9b0; }
        .log-warn { color: #dcdcaa; }
        .log-error { color: #f48771; }
        .log-success { color: #6a9955; }
        
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
            border-left: 4px solid;
        }
        
        .status.ok {
            background: #274330;
            border-color: #6a9955;
            color: #6a9955;
        }
        
        .status.error {
            background: #442726;
            border-color: #f48771;
            color: #f48771;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 流式响应诊断工具</h1>
        
        <div class="section">
            <h2>📝 测试消息</h2>
            <input type="text" id="message" placeholder="输入要发送的消息，例如：你好" value="你好">
            <button onclick="sendMessage()">发送</button>
            <button onclick="clearLog()">清除日志</button>
        </div>
        
        <div class="section">
            <h2>📊 接收的响应（原始字节）</h2>
            <div id="rawResponse" style="background: #1e1e1e; border: 1px solid #555; padding: 10px; max-height: 200px; overflow-y: auto; font-size: 11px; white-space: pre-wrap; word-break: break-all;"></div>
        </div>
        
        <div class="section">
            <h2>🖥️ 调试控制台</h2>
            <div id="console"></div>
        </div>
    </div>

    <script>
        // 拦截 console 日志
        const logElement = document.getElementById('console');
        const rawResponseElement = document.getElementById('rawResponse');
        
        function formatLog(level, timestamp, message) {
            return `${timestamp} [${level}] ${message}`;
        }
        
        function appendLog(level, ...args) {
            const now = new Date().toLocaleTimeString();
            const message = args.map(arg => {
                if (typeof arg === 'object') {
                    try {
                        return JSON.stringify(arg, null, 2);
                    } catch (e) {
                        return String(arg);
                    }
                }
                return String(arg);
            }).join(' ');
            
            const div = document.createElement('div');
            div.className = `log-${level}`;
            div.textContent = formatLog(level.toUpperCase(), now, message);
            logElement.appendChild(div);
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        // 重写 console 方法
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            appendLog('debug', ...args);
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            appendLog('error', ...args);
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            appendLog('warn', ...args);
        };
        
        async function sendMessage() {
            const message = document.getElementById('message').value;
            if (!message.trim()) {
                alert('请输入消息');
                return;
            }
            
            console.log('====== 开始测试 ======');
            console.log('消息内容:', message);
            
            try {
                console.log('发起 POST 请求到 /api/agent/chat/stream');
                
                const response = await fetch('/api/agent/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: message,
                        sessionId: null,
                        includeDetails: false
                    })
                });
                
                console.log('响应状态码:', response.status);
                console.log('响应 Content-Type:', response.headers.get('content-type'));
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ' ' + response.statusText);
                }
                
                // 开始读取流
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let chunkCount = 0;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        console.log('流读取完成');
                        break;
                    }
                    
                    chunkCount++;
                    const chunk = decoder.decode(value, { stream: true });
                    
                    console.log(`数据块 #${chunkCount}: ${value.length} 字节`);
                    console.log('内容:', chunk);
                    
                    // 显示原始响应
                    appendRawResponse(chunk);
                    
                    buffer += chunk;
                }
                
                console.log('总共接收到 ' + chunkCount + ' 个数据块');
                console.log('====== 测试完成 ======');
                
            } catch (error) {
                console.error('错误:', error.message);
                console.log('====== 测试失败 ======');
            }
        }
        
        function appendRawResponse(text) {
            const span = document.createElement('span');
            span.textContent = text;
            rawResponseElement.appendChild(span);
            rawResponseElement.scrollTop = rawResponseElement.scrollHeight;
        }
        
        function clearLog() {
            logElement.innerHTML = '';
            rawResponseElement.innerHTML = '';
            console.log('日志已清除');
        }
        
        // 初始化
        window.addEventListener('load', () => {
            console.log('诊断页面已加载');
            console.log('url: http://localhost:8080/streaming-diagnose.html');
        });
    </script>
</body>
</html>
