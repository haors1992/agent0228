<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监控仪表板 - AI Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .status-badge {
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        .status-healthy { background: #4caf50; color: white; }
        .status-warning { background: #ff9800; color: white; }
        .status-critical { background: #f44336; color: white; }

        .refresh-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .refresh-btn:hover {
            background: #764ba2;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
            font-size: 14px;
        }

        .metric-value {
            color: #333;
            font-weight: bold;
            font-size: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            margin: 8px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            color: #333;
            font-weight: bold;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .status-badge-small {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-ok { background: #e8f5e9; color: #2e7d32; }
        .status-error { background: #ffebee; color: #c62828; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .timestamp {
            text-align: right;
            color: #999;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📊 监控仪表板</h1>
            <div style="display: flex; gap: 20px; align-items: center;">
                <div id="statusBadge" class="status-badge status-healthy">
                    正常运行
                </div>
                <button class="refresh-btn" onclick="refreshDashboard()">🔄 刷新</button>
            </div>
        </div>

        <!-- 实时状态卡片 -->
        <div class="grid">
            <div class="card">
                <h2>💻 系统资源</h2>
                <div id="systemMetrics" class="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="card">
                <h2>⚡ 性能指标</h2>
                <div id="performanceMetrics" class="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="card">
                <h2>📈 API 统计</h2>
                <div id="apiStats" class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- 图表 -->
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));">
            <div class="card">
                <h2>📊 响应时间趋势</h2>
                <div class="chart-container">
                    <canvas id="responseTimeChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>📊 请求类型分布</h2>
                <div class="chart-container">
                    <canvas id="requestTypeChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 最近事件 -->
        <div class="card">
            <h2>📋 最近指标（最近 20 条）</h2>
            <div id="recentMetrics" class="loading">
                <div class="spinner"></div>
            </div>
            <div class="timestamp" id="lastUpdate"></div>
        </div>
    </div>

    <script>
        let responseTimeChart = null;
        let requestTypeChart = null;

        // 初始化
        window.addEventListener('load', () => {
            refreshDashboard();
            // 每 5 秒自动刷新一次
            setInterval(refreshDashboard, 5000);
        });

        async function refreshDashboard() {
            try {
                // 获取仪表板数据
                const response = await fetch('/api/monitoring/dashboard');
                const data = await response.json();

                // 更新各个部分
                updateSystemMetrics(data.status);
                updatePerformanceMetrics(data.performance);
                updateApiStats(data.aggregate);
                updateCharts(data.recent);
                updateRecentMetrics(data.recent);
                updateHealthStatus(data.status);
                updateTimestamp();

            } catch (error) {
                console.error('❌ 加载数据失败:', error);
            }
        }

        function updateSystemMetrics(status) {
            const metrics = status.system;
            let html = '';

            html += `
                <div class="metric">
                    <span class="metric-label">CPU 使用率</span>
                    <span class="metric-value">${metrics.cpuUsage}</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${parseInt(metrics.cpuUsage)}%"></div>
                </div>

                <div class="metric">
                    <span class="metric-label">内存使用率</span>
                    <span class="metric-value">${metrics.memoryUsage}</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${parseInt(metrics.memoryUsage)}%"></div>
                </div>

                <div class="metric">
                    <span class="metric-label">堆内存</span>
                    <span class="metric-value">${metrics.heapUsedMB}/${metrics.heapMaxMB} MB</span>
                </div>

                <div class="metric">
                    <span class="metric-label">活跃线程</span>
                    <span class="metric-value">${metrics.threadCount}</span>
                </div>

                <div class="metric">
                    <span class="metric-label">SSE 连接</span>
                    <span class="metric-value">${status.activeSseConnections}</span>
                </div>
            `;

            document.getElementById('systemMetrics').innerHTML = html;
        }

        function updatePerformanceMetrics(perf) {
            let html = '';

            html += `
                <div class="metric">
                    <span class="metric-label">总 API 调用</span>
                    <span class="metric-value">${perf.totalApiCalls}</span>
                </div>

                <div class="metric">
                    <span class="metric-label">成功率</span>
                    <span class="metric-value">${perf.successRate}</span>
                </div>

                <div class="metric">
                    <span class="metric-label">平均 API 响应时间</span>
                    <span class="metric-value">${perf.avgApiResponseTime || 'N/A'}</span>
                </div>

                <div class="metric">
                    <span class="metric-label">平均推理时间</span>
                    <span class="metric-value">${perf.avgReasoningTime || 'N/A'}</span>
                </div>

                <div class="metric">
                    <span class="metric-label">错误计数</span>
                    <span class="metric-value">${perf.errorCount}</span>
                </div>
            `;

            document.getElementById('performanceMetrics').innerHTML = html;
        }

        function updateApiStats(aggregate) {
            const apiStats = aggregate.api;
            let html = '';

            html += `
                <div class="metric">
                    <span class="metric-label">请求数</span>
                    <span class="metric-value">${apiStats.count}</span>
                </div>

                <div class="metric">
                    <span class="metric-label">平均响应时间</span>
                    <span class="metric-value">${Math.round(apiStats.avgResponseTime || 0)} ms</span>
                </div>

                <div class="metric">
                    <span class="metric-label">最小响应时间</span>
                    <span class="metric-value">${apiStats.minResponseTime || 'N/A'} ms</span>
                </div>

                <div class="metric">
                    <span class="metric-label">最大响应时间</span>
                    <span class="metric-value">${apiStats.maxResponseTime || 'N/A'} ms</span>
                </div>

                <div class="metric">
                    <span class="metric-label">P95 响应时间</span>
                    <span class="metric-value">${apiStats.p95ResponseTime || 'N/A'} ms</span>
                </div>
            `;

            document.getElementById('apiStats').innerHTML = html;
        }

        function updateCharts(recentMetrics) {
            if (!recentMetrics || recentMetrics.length === 0) return;

            // 1. 响应时间趋势图
            const apiMetrics = recentMetrics
                .filter(m => m.metricsType === 'API' && m.responseTime)
                .map(m => ({
                    time: new Date(m.timestamp).toLocaleTimeString(),
                    time_: m.timestamp,
                    responseTime: m.responseTime
                }))
                .sort((a, b) => new Date(a.time_) - new Date(b.time_))
                .slice(-20); // 最近 20 条

            if (responseTimeChart) {
                responseTimeChart.data.labels = apiMetrics.map(m => m.time);
                responseTimeChart.data.datasets[0].data = apiMetrics.map(m => m.responseTime);
                responseTimeChart.update();
            } else {
                const ctx = document.getElementById('responseTimeChart').getContext('2d');
                responseTimeChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: apiMetrics.map(m => m.time),
                        datasets: [{
                            label: '响应时间 (ms)',
                            data: apiMetrics.map(m => m.responseTime),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            }

            // 2. 请求类型分布
            const typeCount = {};
            recentMetrics.forEach(m => {
                const type = m.metricsType || 'UNKNOWN';
                typeCount[type] = (typeCount[type] || 0) + 1;
            });

            if (requestTypeChart) {
                requestTypeChart.data.labels = Object.keys(typeCount);
                requestTypeChart.data.datasets[0].data = Object.values(typeCount);
                requestTypeChart.update();
            } else {
                const ctx = document.getElementById('requestTypeChart').getContext('2d');
                requestTypeChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(typeCount),
                        datasets: [{
                            data: Object.values(typeCount),
                            backgroundColor: [
                                '#667eea',
                                '#764ba2',
                                '#f093fb',
                                '#4facfe'
                            ]
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            }
        }

        function updateRecentMetrics(metrics) {
            if (!metrics || metrics.length === 0) {
                document.getElementById('recentMetrics').innerHTML = '<p style="text-align: center; color: #999;">暂无数据</p>';
                return;
            }

            let html = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>类型</th>
                                <th>端点 / 查询</th>
                                <th>响应时间</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            metrics.slice(-20).reverse().forEach(m => {
                const time = new Date(m.timestamp).toLocaleTimeString();
                const type = m.metricsType || 'UNKNOWN';
                const endpoint = m.apiEndpoint || m.query || '—';
                const shortEndpoint = endpoint.length > 30 ? endpoint.substring(0, 30) + '...' : endpoint;
                const responseTime = m.responseTime ? m.responseTime + ' ms' : '—';
                const status = m.success ? '<span class="status-badge-small status-ok">成功</span>' : '<span class="status-badge-small status-error">失败</span>';

                html += `
                    <tr>
                        <td>${time}</td>
                        <td>${type}</td>
                        <td title="${endpoint}">${shortEndpoint}</td>
                        <td>${responseTime}</td>
                        <td>${status}</td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('recentMetrics').innerHTML = html;
        }

        function updateHealthStatus(status) {
            const cpu = parseInt(status.system.cpuUsage);
            const memory = parseInt(status.system.memoryUsage);

            let healthStatus = 'HEALTHY';
            let badgeClass = 'status-healthy';

            if (cpu > 90 || memory > 90) {
                healthStatus = '🔴 临界';
                badgeClass = 'status-critical';
            } else if (cpu > 75 || memory > 75) {
                healthStatus = '🟡 警告';
                badgeClass = 'status-warning';
            } else {
                healthStatus = '🟢 正常';
                badgeClass = 'status-healthy';
            }

            const badge = document.getElementById('statusBadge');
            badge.textContent = healthStatus;
            badge.className = 'status-badge ' + badgeClass;
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = '最后更新: ' + now.toLocaleTimeString();
        }
    </script>
</body>
</html>
