spring:
  application:
    name: ai-agent-quickstart
  
  profiles:
    active: dev
  
  main:
    allow-circular-references: true

logging:
  level:
    com.agent: DEBUG
    com.agent.monitoring: INFO
    org.springframework: INFO
    org.springframework.web: INFO

# LLM Configuration
llm:
  deepseek:
    enabled: true
    api-key: xxxx
    base-url: https://api.deepseek.com
    model: deepseek-chat
    max-tokens: 4096
    temperature: 0.7
    timeout: 120

# Agent Configuration
agent:
  max-iterations: 10
  timeout: 300
  enable-streaming: false
  session:
    storage-path: ./data/sessions
  knowledge:
    enabled: true
    storage-path: ./data/knowledge
    top-k: 3
    embedding-model: local

server:
  port: 8080

chem-race:
  storage-path: ./data/chem-race

# Application Configuration - 配置演示
app:
  name: AI Agent Application
  version: 2.0.0
  features:
    caching: true
    monitoring: true
    maxConnections: 100
